<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Currency Converter</title>
  </head>
  <body>
    <div class="container">
      <h1>Currency Converter</h1>
      <br />
      <p>Check live rates</p>
      <form action="">
        <div class="convertor-container">
          <div class="amount">
            <p>Enter Amount</p>
            <input type="number" id="amount" placeholder="Amount" required />
          </div>
          <div class="dropdown">
            <div id="FROM">
              <p>From</p>
              <div class="select-container">
                <img src="https://flagsapi.com/US/flat/64.png" alt="US" />
                <select name="from"></select>
              </div>
            </div>
            <i class="fa-solid fa-arrow-right-arrow-left"></i>
            <div id="TO">
              <p>To</p>
              <div class="select-container">
                <img src="https://flagsapi.com/IN/flat/64.png" alt="INR" />
                <select name="to"></select>
              </div>
            </div>
          </div>
        </div>
        <div id="result">1 USD = 83.25 INR</div>
        <button id="submit">Get Exchange Rate</button>
      </form>
    </div>
    <script src="country-code.js"></script>
    <script src="script.js"></script>
  </body>
</html>
